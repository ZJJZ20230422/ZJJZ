<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>딘두 레오파드게코 - 유니버스</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        :root { --emerald: #10b981; --gold: #f59e0b; --ball-size: 54px; --bg-main: radial-gradient(circle, #065f46 0%, #022c22 100%); }

        body {
            background: var(--bg-main); color: #ecfdf5; font-family: 'Jua', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw;
            overflow: hidden; touch-action: none; user-select: none; box-sizing: border-box;
            /* 하단 고정 메뉴 공간 확보 */
            padding-bottom: 120px; 
        }

        #particle-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; pointer-events: none; }
        .full-screen { position: fixed; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        #title-screen { background: radial-gradient(circle, #065f46 0%, #020617 100%); }
        .logo-text { font-family: 'Black Han Sans'; font-size: 38px; color: var(--gold); text-align: center; text-shadow: 0 0 20px var(--gold); margin-bottom: 40px; }
        .start-btn { padding: 18px 60px; font-size: 24px; background: var(--emerald); border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #064e3b; }

        /* [Top UI] */
        .top-nav { padding: 15px 15px 10px; background: rgba(0,0,0,0.8); z-index: 10; border-bottom: 1px solid rgba(16, 185, 129, 0.3); flex-shrink: 0; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .currency-box { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; color: var(--gold); border: 1.5px solid var(--gold); font-size: 15px; }
        .coupon-btn { background: #1e3a8a; border: 1px solid #60a5fa; color: white; padding: 5px 12px; border-radius: 10px; font-size: 11px; }

        .egg-progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #egg-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #f87171, #fbbf24, #10b981); transition: width 0.5s; }

        /* [Game Board] */
        #game-board { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; }
        .tube-wrapper { position: relative; margin-top: 25px; }
        .tube {
            width: 68px; min-height: 230px; border: 3.5px solid var(--emerald); border-top: none; border-radius: 0 0 35px 35px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            backdrop-filter: blur(5px); display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 10px; cursor: pointer; transition: 0.2s;
        }
        .tube-cap { position: absolute; top: -38px; left: 50%; transform: translateX(-50%); font-size: 35px; opacity: 0; transition: 0.5s; }
        .tube.completed .tube-cap { opacity: 1; top: -32px; }
        .tube.selected { transform: translateY(-15px); border-color: #fff; box-shadow: 0 0 25px var(--emerald); }
        .tube-base { position: absolute; bottom: -10px; width: 78px; height: 24px; background: linear-gradient(#5d4037, #3e2723); border-radius: 10px; z-index: -1; }

        .ball { width: var(--ball-size); height: var(--ball-size); flex-shrink: 0; border-radius: 50%; margin: 2px 0; position: relative; background-image: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4) 0%, transparent 60%); box-shadow: inset -4px -4px 10px rgba(0,0,0,0.5); }
        .ball::after { content: ''; position: absolute; width: 100%; height: 100%; top:0; left:0; border-radius: 50%; opacity: 0.5; }
        .skin-normal::after { background-image: radial-gradient(var(--spot-color) 15%, transparent 20%); background-size: 11px 11px; }

        /* [Inventory - Fixed to Bottom] */
        .inventory { 
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 15px 10px 30px; background: rgba(0,0,0,0.95); 
            display: flex; justify-content: center; gap: 8px; 
            z-index: 100; border-top: 2px solid var(--emerald);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        .item-btn { 
            background: linear-gradient(145deg, #064e3b, #022c22); border: 1.5px solid var(--emerald); 
            color: white; padding: 10px 5px; border-radius: 15px; font-size: 10px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; min-width: 65px; flex: 1;
        }

        /* [Modals] */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; }
        .card { background: #064e3b; padding: 25px; border-radius: 30px; border: 3px solid var(--gold); width: 85%; max-width: 380px; text-align: center; }
        
        .collection-container { background:#01110a; width:94%; border-radius:30px; border:2px solid var(--emerald); height:82vh; display:flex; flex-direction:column; position: relative; overflow: hidden; }
        .collection-header { position: relative; background: #022c22; padding: 15px; border-bottom: 2px solid var(--emerald); display: flex; justify-content: center; align-items: center; }
        .close-x { position: absolute; right: 15px; top: 10px; font-size: 32px; color: var(--gold); cursor: pointer; font-family: Arial; font-weight: bold; z-index: 1000; }
        .morph-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:15px; overflow-y: scroll; flex-grow: 1; }
        .morph-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 10px; transition: 0.2s; border: 1.5px solid transparent; }
        .morph-card.locked { opacity: 0.5; background: rgba(0,0,0,0.4); } 
        .morph-card.locked .char-icon { filter: brightness(0); opacity: 0.6; } /* 까만 실루엣 */
        .morph-card.selected { border-color: var(--gold); background: rgba(245,158,11,0.15); }
        .talk-bubble { background: white; color: black; padding: 10px; border-radius: 12px; margin: 10px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <div id="title-screen" class="full-screen">
        <div class="logo-text">딘두를 위한<br>쥬라기 유니버스 🦖</div>
        <button class="start-btn" onclick="enterGame()">탐험 시작하기</button>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="top-nav">
        <div class="nav-row">
            <div onclick="openCollection()" style="cursor:pointer; padding:6px 12px; background:rgba(0,0,0,0.4); border-radius:15px; border:1px solid var(--emerald);">📔 <span id="collection-count">0/1000</span></div>
            <div id="lvl-display" style="font-size: 18px; font-weight: bold;">STAGE 01</div>
            <button class="coupon-btn" onclick="openCoupon()">쿠폰등록</button>
        </div>
        <div class="nav-row">
            <div style="font-size: 10px; color: #fbbf24;">🥚 부화 온도: <span id="egg-percent">0</span>%</div>
            <div class="currency-box">💎 <span id="coin-display">0</span></div>
        </div>
        <div class="egg-progress-container"><div id="egg-bar"></div></div>
    </div>

    <div id="game-board"></div>

    <div class="inventory">
        <button class="item-btn" onclick="useUndo()"><span>↩️</span> 되돌리기 <div id="undo-count" style="color:var(--gold)">2개</div></button>
        <button class="item-btn" onclick="openShop()"><span>🏪</span> 상점</button>
        <button class="item-btn" onclick="useShuffle()"><span>✨</span> 셔플 <div id="shuffle-count" style="color:var(--gold)">1개</div></button>
        <button class="item-btn" onclick="useAddTube()"><span>🧪</span> 튜브 <div id="tube-count" style="color:var(--gold)">0개</div></button>
    </div>

    <div id="shop-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold); margin-top:0;">🦖 DINDU SHOP</h2>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <button onclick="confirmBuy('undo', 1, 150)" style="padding:10px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">↩️ 되돌리기 💎150</button>
                <button onclick="confirmBuy('shuffle', 1, 500)" style="padding:10px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">✨ 셔플 💎500</button>
                <button onclick="confirmBuy('tube', 1, 1200)" style="padding:10px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">🧪 튜브 💎1200</button>
                <hr style="border:0; border-top:1px solid #ffffff33; margin:8px 0;">
                <button onclick="confirmGacha(1, 500)" style="padding:10px; background:#f87171; color:white; border:none; border-radius:10px; font-weight:bold;">🥚 1회 부화 💎500</button>
                <button onclick="confirmGacha(10, 4500)" style="padding:10px; background:#f87171; color:white; border:none; border-radius:10px; font-weight:bold;">🥚 10연속 부화 💎4500</button>
            </div>
            <button onclick="closeModal('shop-modal')" style="margin-top:15px; width:100%; padding:12px; background:var(--emerald); border:none; border-radius:15px; color:white;">닫기</button>
        </div>
    </div>

    <div id="hatch-modal" class="modal">
        <div id="egg-icon" style="font-size:80px; animation: egg-shake 0.4s infinite;">🥚</div>
        <h2 id="hatch-msg" style="color: white; margin: 15px 0;">부화 중...</h2>
        <div id="hatch-result-area" style="display:none; width: 90%;">
            <div id="gacha-result-list" style="max-height:300px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;"></div>
            <button onclick="closeHatch()" style="margin-top: 15px; width:100%; padding:15px; background:var(--gold); border:none; border-radius:12px; font-weight:bold;">확인</button>
        </div>
    </div>

    <div id="collection-modal" class="modal">
        <div class="collection-container">
            <div class="close-x" onclick="closeModal('collection-modal')">×</div>
            <div class="collection-header"><div style="color:var(--emerald); font-size:18px; font-weight:bold;">🦎 딘두의 1000 게코 도감</div></div>
            <div id="bubble" class="talk-bubble">안녕 딘두! 실루엣을 보고 정체를 맞춰봐! ❤️</div>
            <div id="morph-grid" class="morph-grid"></div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div style="font-size:80px;">🦖</div>
        <h2 id="win-praise" style="padding:0 30px; text-align:center; font-size:22px; color:var(--gold); line-height:1.4;"></h2>
        <button onclick="nextLevel()" style="padding:15px 60px; background:var(--emerald); border:none; border-radius:20px; color:white; font-size:18px; font-weight:bold; margin-top:15px;">NEXT STAGE</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const audio = {
            tap: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            drop: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            win: new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3'),
            hatch: new Audio('https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3')
        };
        function play(key) { audio[key].currentTime = 0; audio[key].play().catch(()=>{}); }

        const COLORS = [
            { ball: '#F87171', spot: '#7f1d1d' }, { ball: '#34D399', spot: '#064e3b' },
            { ball: '#FBBF24', spot: '#78350f' }, { ball: '#60A5FA', spot: '#1e3a8a' },
            { ball: '#A78BFA', spot: '#4c1d95' }, { ball: '#F472B6', spot: '#831843' },
            { ball: '#FB923C', spot: '#7c2d12' }, { ball: '#94A3B8', spot: '#1e293b' }
        ];

        const PRAISES = [
            "역시 딘두, 지능 1등급 인증! 🔥", "방금 무빙 뭐야? 완전 게코 고수네!", "딘두 실력에 정글 게코들이 다 놀랐대!", "역시 내 여친, 이런 건 껌이지? 😎", "오늘 딘두 텐션 뭐야? 무적이야!",
            "딘두는 못하는 게 뭐야? 천재지?", "방금 그 판단력, 완전 ESTP 그 자체!", "딘두야, 너 진짜 멋있다! 반했어 ❤️", "게코들이 딘두 무빙 보고 박수친대!", "이걸 깨네? 역시 딘두는 능력자!",
            "딘두의 손가락은 빛보다 빠르다! ✨", "역시 정글의 여왕 딘두! 👑", "딘두야 사랑해! 실력까지 최고야!", "딘두 실력, 진짜 폼 미쳤다! ㄷㄷ", "딘두야, 너 정체가 뭐야? 게임 신?",
            "역시 똑똑한 내 여자친구 딘두!", "딘두야, 너 게임할 때 제일 섹시해!", "딘두 실력 보면 심장이 뛴다!", "딘두야, 영원히 나의 퀸이 되어줘! ❤️"
        ];

        const GECKO_MORPHS = [];
        const pre = ["슈퍼", "하이", "블러드", "미스틱", "골든", "갤럭시", "팬텀", "스노우", "네온", "다크", "울트라", "미라클"];
        const mid = ["레오파드", "크레스티드", "가고일", "토카이", "펫테일", "납테일", "플레임", "타이거"];
        const animIcons = ['🦎', '🦖', '🦕', '🐊', '🐢', '🐸', '🐍', '🐲', '🦜', '🦦', '🐒'];

        for(let i=0; i<1000; i++) {
            const name = `${pre[i%pre.length]} ${mid[i%mid.length]} 게코`;
            const icon = animIcons[i%animIcons.length];
            const skin = i % 3 === 0 ? "skin-normal" : (i % 3 === 1 ? "skin-spotted" : "skin-stars");
            GECKO_MORPHS.push({ name, icon, msg: `No.${i+1} 넌 나의 영원한 짝꿍이야! ❤️`, skin });
        }

        let state = {
            level: 1, coins: 500, tubes: [], selected: null, history: [],
            inventory: { undo: 2, tube: 0, shuffle: 1 },
            collection: "1" + "0".repeat(999), 
            currentSkin: "skin-normal", lastMovedIdx: null,
            eggProgress: 0, assignedAnimals: [], lastMoveTime: 0
        };

        function enterGame() { play('tap'); document.getElementById('title-screen').style.display = 'none'; }

        function init() {
            const saved = localStorage.getItem('DinduUniverse_GitHub_FinalSafe');
            if(saved) state = {...state, ...JSON.parse(saved)};
            startLevel(); initParticles();
        }

        function startLevel() {
            document.body.className = ''; document.body.classList.add(['day', 'night', 'cave'][state.level % 3]);
            const isBoss = [7, 13, 21, 30, 50].includes(state.level);
            const colorCount = isBoss ? 8 : Math.min(3 + Math.floor(state.level / 3), 8);
            const tubeCount = colorCount + (isBoss ? 1 : 2);
            let balls = []; for(let i=0; i<colorCount; i++) for(let j=0; j<4; j++) balls.push(COLORS[i]);
            balls.sort(() => Math.random() - 0.5);
            state.tubes = []; state.assignedAnimals = [];
            for(let i=0; i<tubeCount; i++) {
                state.tubes.push(i < colorCount ? balls.splice(0, 4) : []);
                state.assignedAnimals.push(animIcons[Math.floor(Math.random()*animIcons.length)]);
            }
            state.selected = null; state.history = []; render(); updateUI();
        }

        function render() {
            const board = document.getElementById('game-board'); board.innerHTML = '';
            state.tubes.forEach((balls, idx) => {
                const wrapper = document.createElement('div'); wrapper.className = 'tube-wrapper';
                const isComplete = balls.length === 4 && balls.every(b => b.ball === balls[0].ball);
                const tube = document.createElement('div');
                tube.className = `tube ${state.selected === idx ? 'selected' : ''} ${isComplete ? 'completed' : ''}`;
                tube.onclick = () => handleTap(idx);
                const cap = document.createElement('div'); cap.className = 'tube-cap'; cap.innerText = state.assignedAnimals[idx];
                tube.appendChild(cap);
                balls.forEach((data, bIdx) => {
                    const ball = document.createElement('div'); ball.className = `ball ${state.currentSkin}`;
                    ball.style.backgroundColor = data.ball; ball.style.setProperty('--spot-color', data.spot);
                    tube.appendChild(ball);
                });
                const base = document.createElement('div'); base.className = 'tube-base';
                wrapper.appendChild(tube); wrapper.appendChild(base); board.appendChild(wrapper);
            });
        }

        function handleTap(idx) {
            play('tap');
            if (state.selected === null) { if (state.tubes[idx].length > 0) state.selected = idx; }
            else { if (state.selected === idx) state.selected = null; else move(state.selected, idx); }
            render();
        }

        function move(from, to) {
            const f = state.tubes[from]; const t = state.tubes[to];
            if (t.length < 4 && (t.length === 0 || t[t.length-1].ball === f[f.length-1].ball)) {
                state.history.push(JSON.stringify(state.tubes));
                t.push(f.pop()); state.selected = null; play('drop');
                if(checkWin()) setTimeout(showWin, 600);
            } else { state.selected = null; }
        }

        function checkWin() { return state.tubes.every(t => t.length === 0 || (t.length === 4 && t.every(b => b.ball === t[0].ball))); }

        function showWin() {
            play('win'); 
            const praise = PRAISES[Math.floor(Math.random()*PRAISES.length)];
            document.getElementById('win-praise').innerText = praise;
            document.getElementById('win-modal').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            state.coins += 100; state.eggProgress += 20;
            if (state.eggProgress >= 100) { state.eggProgress = 0; setTimeout(() => hatchGacha(1), 1000); }
            save(); updateUI();
        }

        function hatchGacha(count) {
            document.getElementById('hatch-modal').style.display = 'flex';
            document.getElementById('hatch-result-area').style.display = 'none';
            document.getElementById('hatch-msg').innerText = "부화 중...";
            setTimeout(() => {
                play('hatch');
                const list = document.getElementById('gacha-result-list'); list.innerHTML = '';
                for(let i=0; i<count; i++) {
                    const idx = Math.floor(Math.random() * 1000);
                    const g = GECKO_MORPHS[idx];
                    state.collection = state.collection.substring(0, idx) + '1' + state.collection.substring(idx + 1);
                    const item = document.createElement('div');
                    item.style.cssText = "display:flex; align-items:center; gap:10px; padding:8px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:10px;";
                    item.innerHTML = `<span style="font-size:24px">${g.icon}</span><div style="text-align:left;"><b>${g.name}</b><br><small>No.${idx+1}</small></div>`;
                    list.appendChild(item);
                }
                document.getElementById('hatch-result-area').style.display = 'block';
                document.getElementById('hatch-msg').innerText = `${count}마리 탄생!`;
                save(); updateUI();
            }, 1200);
        }

        function openCoupon() {
            const code = prompt("비밀 쿠폰 입력! ❤️");
            if(code === "딘두사랑해") {
                state.coins += 10000; alert("🎁 10,000 다이아몬드 지급! ❤️");
                updateUI(); save();
            } else if(code) alert("잘못된 번호야!");
        }

        function openCollection() {
            const grid = document.getElementById('morph-grid'); grid.innerHTML = ''; 
            document.getElementById('collection-modal').style.display = 'flex';
            const frag = document.createDocumentFragment();
            for(let i=0; i<1000; i++) {
                const g = GECKO_MORPHS[i]; const isU = state.collection[i] === '1';
                const card = document.createElement('div');
                card.className = `morph-card ${isU ? '' : 'locked'} ${state.currentSkin === g.skin && isU ? 'selected' : ''}`;
                card.innerHTML = `<div class="char-icon" style="font-size:28px">${g.icon}</div><div class="name-text" style="margin-top:5px; font-weight:bold;">${g.name}</div><div style="font-size:8px; opacity:0.3;">No.${i+1}</div>`;
                if (isU) card.onclick = () => { document.getElementById('bubble').innerText = g.msg; state.currentSkin = g.skin; play('tap'); openCollection(); render(); };
                frag.appendChild(card);
            }
            grid.appendChild(frag);
        }

        function save() { localStorage.setItem('DinduUniverse_GitHub_FinalSafe', JSON.stringify(state)); }
        function updateUI() {
            document.getElementById('lvl-display').innerText = `STAGE ${state.level.toString().padStart(2, '0')}`;
            document.getElementById('coin-display').innerText = state.coins.toLocaleString();
            document.getElementById('undo-count').innerText = `${state.inventory.undo}개`;
            document.getElementById('tube-count').innerText = `${state.inventory.tube}개`;
            document.getElementById('shuffle-count').innerText = `${state.inventory.shuffle}개`;
            document.getElementById('collection-count').innerText = `${(state.collection.match(/1/g) || []).length}/1000`;
            document.getElementById('egg-bar').style.width = `${state.eggProgress}%`;
        }

        function confirmBuy(type, amount, price) { if(confirm(`💎 ${price}개를 써서 구매할까?`)) { if(state.coins >= price) { state.coins -= price; state.inventory[type] += amount; updateUI(); save(); play('tap'); } else alert("다이아 부족!"); } }
        function confirmGacha(amount, price) { if(confirm(`💎 ${price}개를 써서 알을 부화시킬까?`)) { if(state.coins >= price) { state.coins -= price; hatchGacha(amount); } else alert("다이아 부족!"); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openShop() { document.getElementById('shop-modal').style.display = 'flex'; }
        function nextLevel() { state.level++; document.getElementById('win-modal').style.display = 'none'; save(); startLevel(); }
        function closeHatch() { document.getElementById('hatch-modal').style.display = 'none'; }
        function useUndo() { if(state.inventory.undo > 0 && state.history.length) { state.inventory.undo--; state.tubes = JSON.parse(state.history.pop()); render(); updateUI(); save(); } }
        function useAddTube() { if(state.inventory.tube > 0) { state.inventory.tube--; state.tubes.push([]); render(); updateUI(); save(); } }
        function useShuffle() { if(state.inventory.shuffle > 0) { play('hatch'); startLevel(); state.inventory.shuffle--; save(); } }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array(15).fill().map(() => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2, v: Math.random() * 0.15 }));
            function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
            draw();
        }
        init();
    </script>
</body>
</html>
