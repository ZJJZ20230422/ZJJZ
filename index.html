<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>딘두 레오파드게코 - 리얼 유니버스</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        :root { --emerald: #10b981; --gold: #f59e0b; --bg-main: radial-gradient(circle, #065f46 0%, #022c22 100%); --ball-size: 50px; }

        body {
            background: var(--bg-main); color: #ecfdf5; font-family: 'Jua', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw;
            overflow: hidden; touch-action: none; user-select: none; box-sizing: border-box;
            padding-bottom: 90px; 
        }

        #particle-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; pointer-events: none; }
        .full-screen { position: fixed; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        #title-screen { background: radial-gradient(circle, #065f46 0%, #020617 100%); }
        .logo-text { font-family: 'Black Han Sans'; font-size: 38px; color: var(--gold); text-align: center; text-shadow: 0 0 20px var(--gold); margin-bottom: 40px; }
        .start-btn { padding: 18px 60px; font-size: 24px; background: var(--emerald); border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #064e3b; }

        /* [Top UI] */
        .top-nav { padding: 10px 12px; background: rgba(0,0,0,0.85); z-index: 10; border-bottom: 1px solid rgba(16, 185, 129, 0.3); flex-shrink: 0; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 4px; position: relative; }
        .btn-group { display: flex; gap: 4px; }
        .nav-btn { padding: 6px 8px; background: rgba(0,0,0,0.4); border-radius: 10px; border: 1px solid var(--emerald); cursor: pointer; font-size: 11px; }
        #lvl-display { font-size: 18px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--emerald); position: absolute; left: 50%; transform: translateX(-50%); width: 100px; text-align: center; pointer-events: none; }
        .currency-box { background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; color: var(--gold); border: 1.5px solid var(--gold); font-size: 13px; min-width: 65px; text-align: right; }
        .coupon-btn { background: #1e3a8a; border: 1px solid #60a5fa; color: white; padding: 5px 8px; border-radius: 8px; font-size: 10px; }

        .egg-progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 4px; }
        #egg-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #f87171, #fbbf24, #10b981); transition: width 0.5s; }
        #combo-info { text-align: right; font-size: 11px; color: #ff0055; height: 14px; font-weight: bold; margin-top: 2px; opacity: 0; }
        #combo-info.active { opacity: 1; transform: scale(1.1); }

        #game-board { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 4px; padding: 10px 5px; flex-grow: 1; width: 100%; box-sizing: border-box; }
        .tube-wrapper { position: relative; flex-shrink: 1; display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
        .tube { width: calc(var(--ball-size) + 12px); min-height: calc(var(--ball-size) * 4 + 15px); border: 3px solid var(--emerald); border-top: none; border-radius: 0 0 40px 40px; background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); backdrop-filter: blur(5px); display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .tube-cap { position: absolute; top: -35px; font-size: 28px; opacity: 0; transition: 0.5s; }
        .tube.completed .tube-cap { opacity: 1; top: -32px; }
        .tube.selected { transform: translateY(-15px); border-color: #fff; box-shadow: 0 0 20px var(--emerald); }
        .tube-base { position: absolute; bottom: -8px; width: 110%; height: 18px; background: linear-gradient(#5d4037, #3e2723); border-radius: 8px; z-index: -1; }
        .ball { width: var(--ball-size); height: var(--ball-size); border-radius: 50%; margin: 1px 0; position: relative; background-image: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4) 0%, transparent 60%); box-shadow: inset -3px -3px 8px rgba(0,0,0,0.5); }
        .ball::after { content: ''; position: absolute; width: 100%; height: 100%; top:0; left:0; border-radius: 50%; opacity: 0.5; background-image: radial-gradient(var(--spot-color) 15%, transparent 20%); background-size: 10px 10px; }

        .inventory { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; padding: 5px 10px 15px; background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center; gap: 6px; z-index: 100; border-top: 2px solid var(--emerald); box-sizing: border-box; }
        .item-btn { background: linear-gradient(145deg, #064e3b, #022c22); border: 1.5px solid var(--emerald); color: white; padding: 5px; border-radius: 12px; font-size: 9px; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-width: 60px; flex: 1; height: 55px; justify-content: center; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; }
        .card { background: #064e3b; padding: 25px; border-radius: 30px; border: 3px solid var(--gold); width: 88%; max-width: 380px; text-align: center; max-height: 85vh; overflow-y: auto; position: relative; }
        
        .collection-container { background:#01110a; width:94%; border-radius:30px; border:2px solid var(--emerald); height:85vh; display:flex; flex-direction:column; position: relative; overflow: hidden; }
        .collection-header { position: relative; background: #022c22; padding: 18px; border-bottom: 2px solid var(--emerald); display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .close-x { position: absolute; right: 20px; font-size: 36px; color: var(--gold); cursor: pointer; font-family: Arial, sans-serif; font-weight: bold; z-index: 7000; }
        
        .morph-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:15px; overflow-y: auto; flex-grow: 1; }
        .morph-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 10px; border: 1.5px solid transparent; transition: 0.2s; }
        .morph-card.locked { opacity: 0.35; background: rgba(0,0,0,0.4); } 
        .morph-card.locked .char-icon { filter: grayscale(100%); } 

        .gacha-item { display:flex; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,0.08); margin-bottom:8px; border-radius:12px; border-left:4px solid var(--gold); position: relative; }
        .duplicate-tag { background: #ef4444; color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; position: absolute; top: 5px; right: 5px; }
        .payback-text { color: #fbbf24; font-size: 10px; font-weight: bold; margin-left: auto; }
        .mission-row { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #10b981; text-align: left; }
    </style>
</head>
<body>
    <div id="title-screen" class="full-screen">
        <div class="logo-text">딘두를 위한<br>리얼 유니버스 🦖</div>
        <button class="start-btn" onclick="enterGame()">탐험 시작하기</button>
    </div>
    <canvas id="particle-canvas"></canvas>
    <div class="top-nav">
        <div class="nav-row">
            <div class="btn-group">
                <div class="nav-btn" onclick="openCollection()">📔 도감 <span id="collection-count">0</span></div>
                <div class="nav-btn" onclick="openMission()" style="border-color:var(--gold); color:var(--gold);">🏆 미션</div>
            </div>
            <div id="lvl-display">단계 01</div>
            <button class="coupon-btn" onclick="openCoupon()">쿠폰등록</button>
        </div>
        <div class="nav-row">
            <div style="font-size: 10px; color: #fbbf24;">🥚 부화 온도: <span id="egg-percent">0</span>%</div>
            <div class="currency-box">💎 <span id="coin-display">0</span></div>
        </div>
        <div class="egg-progress-container"><div id="egg-bar"></div></div>
        <div id="combo-info">연속 성공 🔥 x<span id="combo-num">0</span> (+5💎)</div>
    </div>
    <div id="game-board"></div>
    <div class="inventory">
        <button class="item-btn" onclick="useUndo()"><span>↩️</span> 되돌리기 <div id="undo-count" style="color:var(--gold)">0개</div></button>
        <button class="item-btn" onclick="openShop()"><span>🏪</span> 상점</button>
        <button class="item-btn" onclick="useShuffle()"><span>✨</span> 셔플 <div id="shuffle-count" style="color:var(--gold)">0개</div></button>
        <button class="item-btn" onclick="useAddTube()"><span>🧪</span> 튜브 <div id="tube-count" style="color:var(--gold)">0개</div></button>
    </div>
    <div id="shop-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold); margin-top:0; font-size: 20px;">🦖 딘두 프리미엄 상점</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <button onclick="confirmBuy('undo', 1, 100)" style="padding:10px; background:var(--gold); border:none; border-radius:10px; font-size:11px; color:black;">↩️ 1개 100</button>
                <button onclick="confirmBuy('undo', 10, 900)" style="padding:10px; background:#f87171; color:white; border:none; border-radius:10px; font-size:11px;">↩️ 10개 900</button>
                <button onclick="confirmBuy('shuffle', 1, 100)" style="padding:10px; background:var(--gold); border:none; border-radius:10px; font-size:11px; color:black;">✨ 1개 100</button>
                <button onclick="confirmBuy('shuffle', 10, 900)" style="padding:10px; background:#f87171; color:white; border:none; border-radius:10px; font-size:11px;">✨ 10개 900</button>
                <button onclick="confirmBuy('tube', 1, 500)" style="padding:10px; background:var(--gold); border:none; border-radius:10px; font-size:11px; color:black;">🧪 1개 500</button>
                <button onclick="confirmBuy('tube', 10, 4500)" style="padding:10px; background:#f87171; color:white; border:none; border-radius:10px; font-size:11px;">🧪 10개 4500</button>
            </div>
            <hr style="border:0; border-top:1px solid #ffffff33; margin:12px 0;">
            <button onclick="confirmGacha(1, 500)" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:5px;">🥚 랜덤 부화 1회 💎 500</button>
            <button onclick="confirmGacha(10, 4500)" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:10px; font-weight:bold;">🥚 10연속 부화 💎 4500</button>
            <button onclick="closeModal('shop-modal')" style="margin-top:15px; width:100%; padding:12px; background:#374151; border:none; border-radius:15px; color:white;">닫기</button>
        </div>
    </div>
    <div id="mission-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold); margin-top:0;">🏆 콜렉터 미션</h2>
            <div id="mission-list" style="text-align:left;"></div>
            <button onclick="closeModal('mission-modal')" style="margin-top:15px; width:100%; padding:12px; background:var(--emerald); border:none; border-radius:15px; color:white;">닫기</button>
        </div>
    </div>
    <div id="hatch-modal" class="modal">
        <div id="egg-icon" style="font-size:80px; animation: egg-shake 0.4s infinite;">🥚</div>
        <h2 id="hatch-msg" style="color: white; margin: 15px 0;">부화 중...</h2>
        <div id="hatch-result-area" style="display:none; width: 92%;">
            <div id="gacha-result-list" style="max-height:300px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;"></div>
            <button onclick="closeHatch()" style="margin-top: 15px; width:100%; padding:15px; background:var(--gold); border:none; border-radius:12px; font-weight:bold; color:black;">확인</button>
        </div>
    </div>
    <div id="collection-modal" class="modal">
        <div class="collection-container">
            <div class="collection-header">
                <div style="color:var(--emerald); font-size:18px; font-weight:bold;">🦎 1000마리 리얼 생태 박물관</div>
                <div class="close-x" onclick="closeModal('collection-modal')">×</div>
            </div>
            <div id="morph-grid" class="morph-grid"></div>
        </div>
    </div>
    <div id="win-modal" class="modal">
        <div style="font-size:70px;">🦖</div>
        <h2 id="win-praise" style="padding:0 30px; text-align:center; font-size:20px; color:var(--gold); line-height:1.4;"></h2>
        <button onclick="nextLevel()" style="padding:15px 60px; background:var(--emerald); border:none; border-radius:20px; color:white; font-size:18px; font-weight:bold; margin-top:15px;">다음 단계로</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const audio = { tap: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'), drop: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'), win: new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3'), hatch: new Audio('https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3') };
        function play(key) { audio[key].currentTime = 0; audio[key].play().catch(()=>{}); }
        const COLORS = [{ball:'#F87171',spot:'#7f1d1d'},{ball:'#34D399',spot:'#064e3b'},{ball:'#FBBF24',spot:'#78350f'},{ball:'#60A5FA',spot:'#1e3a8a'},{ball:'#A78BFA',spot:'#4c1d95'},{ball:'#F472B6',spot:'#831843'},{ball:'#FB923C',spot:'#7c2d12'},{ball:'#94A3B8',spot:'#1e293b'}];
        const PRAISES = ["역시 딘두, 지능 1등급 인증! 🔥", "방금 무빙 뭐야? 완전 고수네!", "딘두야, 너 진짜 멋있다! 반했어 ❤️", "이걸 깨네? 역시 딘두는 능력자!", "역시 정글의 여왕 딘두! 👑", "딘두야 사랑해! 실력까지 최고야!", "딘두 실력, 진짜 폼 미쳤다! ㄷㄷ", "딘두야, 너 정체가 뭐야? 게임 신?", "딘두는 게임할 때 제일 섹시해!", "딘두야, 영원히 나의 퀸이 되어줘! ❤️"];

        // [리얼 한글 데이터 구축 - 중복 절대 없음]
        const GECKO_MORPHS = [];
        
        // 1-300 양서류 (30모프 x 10종)
        const amPre = ["딸기","살구","사무라이 블루","민트 판타지","뮤턴트","레몬초코","말차","버건디","커피","라임 알비노","선버스트","피카츄","에메랄드","스노우 화이트","크랜베리","브라운","블랙 오네이트","초코 민트","바나나","오렌지","레드 오네이트","골든","블루 카모","다크 그린","옐로우","라벤더","파스텔","아쿠아 블루","스트로베리 파인애플","밀크초코"];
        const amKind = ["팩맨","우파루파","독개구리","청개구리","나무개구리","살라만더","뉴트","도롱뇽","맹꽁이","황소개구리"];

        // 301-700 파충류 (40모프 x 10종)
        const gePre = ["블랙 나이트","디아블로 블랑코","릴리 화이트","아잔틱","카푸치노","프라푸치노","탠저린","썬글로우","랩터","레이더","벨 알비노","트렘퍼","이클립스","맥스노우","블러드","팬텀","화이트아웃","오레오","줄루","고스트","패턴리스","엠버","캐러멜","블리자드","노바","드림시클","슈퍼스노우","황제","인페르노","파이어볼드","전설의 화이트","스노우 벨","타이푼","스텔스","토네이도","아토믹","일렉트릭","선버스트","정글","애버런트"];
        const geKind = ["레오파드 게코","크레스티드 게코","펫테일 게코","가고일 게코","토카이 게코","납테일 게코","바이퍼 게코","데이 게코","볼파이톤","왕뱀"];

        // 701-1000 공룡 (20종 x 15수식어)
        const diName = ["티라노사우르스","트리케라톱스","브라키오사우르스","벨로키랍토르","프테라노돈","모사사우르스","스테고사우르스","안킬로사우르스","스피노사우르스","알로사우르스","기가노토사우르스","파라사우롤로푸스","딜로포사우르스","카르노타우루스","테리지노사우르스","데이노니쿠스","바리오닉스","수코미무스","익티오사우르스","엘라스모사우르스"];
        const diEpi = ["렉스","호리두스","몽골리엔시스","알티토락스","롱기셉스","호프마니","스테놉스","마그니벤트리스","아이깁티아쿠스","프라길리스","로롤리니","워커리","웨더릴리","사스트레이","코뮤니스"];

        for(let i=0; i<1000; i++) {
            let name, icon;
            if(i < 300) {
                name = `${amPre[i % 30]} ${amKind[Math.floor(i / 30)]}`;
                icon = ['🐸','🦦','🐠','🐙'][i % 4];
            } else if(i < 700) {
                const j = i - 300;
                name = `${gePre[j % 40]} ${geKind[Math.floor(j / 40)]}`;
                icon = ['🦎','🐍','🐉','🦂'][i % 4];
            } else {
                const k = i - 700;
                name = `${diName[k % 20]} ${diEpi[Math.floor(k / 20)]}`;
                icon = ['🦖','🦕','🐲','🌋'][i % 4];
            }
            if((i+1) % 100 === 0) name = `💎 [보물] ${name}`;
            GECKO_MORPHS.push({ name, icon });
        }

        let state = { level: 1, coins: 500, tubes: [], selected: null, history: [], inventory: { undo: 2, tube: 0, shuffle: 1 }, collection: "1" + "0".repeat(999), eggProgress: 0, comboCount: 0, lastMoveTime: 0, milestones: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000], claimed: [] };
        function enterGame() { play('tap'); document.getElementById('title-screen').style.display = 'none'; }
        function init() { const saved = localStorage.getItem('Dindu_LeopardGecko_Eternal_Save'); if(saved) state = {...state, ...JSON.parse(saved)}; startLevel(); initParticles(); }
        function calculateBallSize(count) { const maxTubeWidth = window.innerWidth / count - 6; const ballSize = Math.min(Math.max(maxTubeWidth - 14, 25), 54); document.documentElement.style.setProperty('--ball-size', `${ballSize}px`); }
        function startLevel() { document.body.className = ''; document.body.classList.add(['day', 'night', 'cave'][state.level % 3]); const colorCount = Math.min(3 + Math.floor(state.level / 2.5), 8); const tubeCount = Math.min(colorCount + 3, 12); calculateBallSize(tubeCount); let balls = []; for(let i=0; i<colorCount; i++) for(let j=0; j<4; j++) balls.push(COLORS[i]); balls.sort(() => Math.random() - 0.5); state.tubes = []; for(let i=0; i<tubeCount; i++) state.tubes.push(i < colorCount ? balls.splice(0, 4) : []); state.selected = null; state.history = []; render(); updateUI(); }
        function render() { const board = document.getElementById('game-board'); board.innerHTML = ''; state.tubes.forEach((balls, idx) => { const wrapper = document.createElement('div'); wrapper.className = 'tube-wrapper'; const isComplete = balls.length === 4 && balls.every(b => b.ball === balls[0].ball); const tube = document.createElement('div'); tube.className = `tube ${state.selected === idx ? 'selected' : ''} ${isComplete ? 'completed' : ''}`; tube.onclick = () => handleTap(idx); const cap = document.createElement('div'); cap.className = 'tube-cap'; cap.innerText = '🦎'; tube.appendChild(cap); balls.forEach((data) => { const ball = document.createElement('div'); ball.className = 'ball'; ball.style.backgroundColor = data.ball; ball.style.setProperty('--spot-color', data.spot); tube.appendChild(ball); }); const base = document.createElement('div'); base.className = 'tube-base'; wrapper.appendChild(tube); wrapper.appendChild(base); board.appendChild(wrapper); }); }
        function handleTap(idx) { play('tap'); if (state.selected === null) { if (state.tubes[idx].length > 0) state.selected = idx; } else { if (state.selected === idx) state.selected = null; else move(state.selected, idx); } render(); }
        function move(from, to) { const f = state.tubes[from]; const t = state.tubes[to]; if (t.length < 4 && (t.length === 0 || t[t.length-1].ball === f[f.length-1].ball)) { state.history.push(JSON.stringify(state.tubes)); t.push(f.pop()); let now = Date.now(); if (now - state.lastMoveTime < 1500) { state.comboCount++; if(state.comboCount >= 2) triggerCombo(); } else { state.comboCount = 0; } state.lastMoveTime = now; state.selected = null; play('drop'); if(checkWin()) setTimeout(showWin, 600); } else { state.selected = null; } }
        function triggerCombo() { state.coins += 5; const info = document.getElementById('combo-info'); document.getElementById('combo-num').innerText = state.comboCount; info.classList.add('active'); updateUI(); setTimeout(() => info.classList.remove('active'), 800); }
        function checkWin() { return state.tubes.every(t => t.length === 0 || (t.length === 4 && t.every(b => b.ball === t[0].ball))); }
        function showWin() { play('win'); document.getElementById('win-praise').innerText = PRAISES[Math.floor(Math.random()*PRAISES.length)]; document.getElementById('win-modal').style.display = 'flex'; confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); state.coins += 100; state.eggProgress += 20; if (state.eggProgress >= 100) { state.eggProgress = 0; setTimeout(() => hatchGacha(1), 1000); } save(); updateUI(); }
        function hatchGacha(count) { document.getElementById('hatch-modal').style.display = 'flex'; document.getElementById('hatch-result-area').style.display = 'none'; document.getElementById('hatch-msg').innerText = "부화 중..."; setTimeout(() => { play('hatch'); const list = document.getElementById('gacha-result-list'); list.innerHTML = ''; let totalRefund = 0; const refundPerUnit = (count === 10) ? 225 : 250; for(let i=0; i<count; i++) { const idx = Math.floor(Math.random() * 1000); const isDup = state.collection[idx] === '1'; const g = GECKO_MORPHS[idx]; if (isDup) totalRefund += refundPerUnit; else state.collection = state.collection.substring(0, idx) + '1' + state.collection.substring(idx + 1); const item = document.createElement('div'); item.className = 'gacha-item'; item.innerHTML = `<span style="font-size:24px">${g.icon}</span><div><b>${g.name}</b><br><small>번호.${idx+1}</small></div>${isDup ? `<span class="duplicate-tag">중복</span><span class="payback-text">+${refundPerUnit}💎</span>` : ''}`; list.appendChild(item); } if (totalRefund > 0) { state.coins += totalRefund; document.getElementById('hatch-msg').innerText = `총 ${totalRefund}💎 회수!`; } else document.getElementById('hatch-msg').innerText = "새로운 친구 탄생!"; document.getElementById('hatch-result-area').style.display = 'block'; save(); updateUI(); checkMilestone(); }, 1200); }
        function checkMilestone() { const count = (state.collection.match(/1/g) || []).length; state.milestones.forEach(m => { if (count >= m && !state.claimed.includes(m)) { state.claimed.push(m); triggerJackpot(m); } }); }
        function triggerJackpot(m) { confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 } }); state.coins += 2000; state.inventory.shuffle += 5; state.inventory.undo += 5; alert(`🎉 도감 ${m}마리 달성!\n💎 2,000개 + 아이템 보따리 증정! ❤️`); save(); updateUI(); }
        function openMission() { const count = (state.collection.match(/1/g) || []).length; const list = document.getElementById('mission-list'); list.innerHTML = ''; state.milestones.forEach(m => { const isDone = state.claimed.includes(m); const row = document.createElement('div'); row.className = 'mission-row'; row.style.borderColor = isDone ? '#fbbf24' : '#10b981'; row.innerHTML = `<b>도감 ${m}마리 수집</b><span style="float:right;">${isDone ? '✅ 완료' : (count + '/' + m)}</span><div style="font-size:11px; margin-top:5px; color:#aaa;">보상: 2000💎 + 아이템 패키지</div>`; list.appendChild(row); }); document.getElementById('mission-modal').style.display = 'flex'; }
        function openCoupon() { const code = prompt("비밀 쿠폰 입력! ❤️"); if(code === "딘두사랑해") { state.coins += 10000; updateUI(); save(); alert("🎁 10,000 다이아몬드 지급 완료! 딘두님 사랑해요! ❤️"); } else if(code) alert("잘못된 번호야!"); }
        function openCollection() { const grid = document.getElementById('morph-grid'); grid.innerHTML = ''; document.getElementById('collection-modal').style.display = 'flex'; const frag = document.createDocumentFragment(); for(let i=0; i<1000; i++) { const isU = state.collection[i] === '1'; const g = GECKO_MORPHS[i]; const card = document.createElement('div'); card.className = `morph-card ${isU ? '' : 'locked'}`; card.innerHTML = `<div class="char-icon" style="font-size:28px">${g.icon}</div><div class="name-text" style="margin-top:5px; font-weight:bold;">${g.name}</div><div style="font-size:8px; opacity:0.3;">번호.${i+1}</div>`; frag.appendChild(card); } grid.appendChild(frag); }
        function save() { localStorage.setItem('Dindu_LeopardGecko_Eternal_Save', JSON.stringify(state)); }
        function updateUI() { document.getElementById('lvl-display').innerText = `단계 ${state.level.toString().padStart(2, '0')}`; document.getElementById('coin-display').innerText = Math.floor(state.coins).toLocaleString(); document.getElementById('undo-count').innerText = `${state.inventory.undo}개`; document.getElementById('shuffle-count').innerText = `${state.inventory.shuffle}개`; document.getElementById('tube-count').innerText = `${state.inventory.tube}개`; const unlocked = (state.collection.match(/1/g) || []).length; document.getElementById('collection-count').innerText = unlocked; document.getElementById('egg-bar').style.width = `${state.eggProgress}%`; document.getElementById('egg-percent').innerText = state.eggProgress; }
        function confirmBuy(type, amount, price) { if(confirm(`💎 ${price}개를 써서 ${amount}개를 구매할까?`)) { if(state.coins >= price) { state.coins -= price; state.inventory[type] += amount; updateUI(); save(); play('tap'); } else alert("다이아 부족!"); } }
        function confirmGacha(amount, price) { if(confirm(`💎 ${price}개를 써서 부화시킬까?`)) { if(state.coins >= price) { state.coins -= price; hatchGacha(amount); } else alert("다이아 부족!"); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openShop() { document.getElementById('shop-modal').style.display = 'flex'; }
        function nextLevel() { state.level++; document.getElementById('win-modal').style.display = 'none'; save(); startLevel(); }
        function closeHatch() { document.getElementById('hatch-modal').style.display = 'none'; }
        function useUndo() { if(state.inventory.undo > 0 && state.history.length) { state.inventory.undo--; state.tubes = JSON.parse(state.history.pop()); render(); updateUI(); save(); } }
        function useAddTube() { if(state.inventory.tube > 0 && state.tubes.length < 12) { state.inventory.tube--; state.tubes.push([]); calculateBallSize(state.tubes.length); render(); updateUI(); save(); } else if(state.tubes.length >= 12) alert("이미 가득 찼어!"); }
        function useShuffle() { if(state.inventory.shuffle > 0) { play('hatch'); startLevel(); state.inventory.shuffle--; save(); } }
        function initParticles() { const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let p = Array(15).fill().map(() => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2, v: Math.random() * 0.15 })); function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); } draw(); }
        init();
    </script>
