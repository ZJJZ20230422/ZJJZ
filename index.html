<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>딘두 레오파드게코 - 마스터 에디션</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        :root { --emerald: #10b981; --gold: #f59e0b; --bg-main: radial-gradient(circle, #065f46 0%, #022c22 100%); --ball-size: 50px; }
        body { background: var(--bg-main); color: #ecfdf5; font-family: 'Jua', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; user-select: none; box-sizing: border-box; padding-bottom: 90px; }
        body.golden-stage { background: radial-gradient(circle, #f59e0b 0%, #78350f 100%); }
        #particle-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; pointer-events: none; }
        .full-screen { position: fixed; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        #title-screen { background: radial-gradient(circle, #065f46 0%, #020617 100%); }
        
        /* 로비 & 랭킹 */
        .lobby-gecko-area { position: relative; cursor: pointer; transform: scale(1.5); margin: 30px 0; }
        .heart-fx { position: absolute; top: -20px; font-size: 20px; animation: heart-float 1s forwards; }
        @keyframes heart-float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
        .rank-info { font-size: 14px; color: var(--gold); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; margin-bottom: 10px; }
        .worm-target { position: absolute; font-size: 30px; cursor: pointer; z-index: 5001; transition: 0.5s linear; }

        /* [Top UI] */
        .top-nav { padding: 10px 12px; background: rgba(0,0,0,0.85); z-index: 10; border-bottom: 1px solid rgba(16, 185, 129, 0.3); flex-shrink: 0; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 4px; position: relative; }
        .btn-group { display: flex; gap: 4px; }
        .nav-btn { padding: 6px 8px; background: rgba(0,0,0,0.4); border-radius: 10px; border: 1px solid var(--emerald); cursor: pointer; font-size: 11px; }
        #timer-display { font-size: 20px; color: #f87171; font-weight: bold; position: absolute; left: 50%; top: 45px; transform: translateX(-50%); display: none; text-shadow: 0 0 10px red; z-index: 100; }
        #lvl-display { font-size: 18px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--emerald); position: absolute; left: 50%; transform: translateX(-50%); width: 120px; text-align: center; }
        .currency-box { background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; color: var(--gold); border: 1.5px solid var(--gold); font-size: 13px; min-width: 65px; text-align: right; }
        
        /* 게임 필드 */
        #game-board { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 4px; padding: 10px 5px; flex-grow: 1; box-sizing: border-box; }
        .tube-wrapper { position: relative; flex-shrink: 1; display: flex; flex-direction: column; align-items: center; margin-top: 35px; }
        .tube { width: calc(var(--ball-size) + 14px); min-height: calc(var(--ball-size) * 4 + 18px); border: 3px solid var(--tube-color, var(--emerald)); border-top: none; border-radius: 0 0 40px 40px; background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); backdrop-filter: blur(5px); display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 8px; cursor: pointer; }
        .tube.hard-5 { min-height: calc(var(--ball-size) * 5 + 20px); }
        .tube.hard-6 { min-height: calc(var(--ball-size) * 6 + 22px); }
        .tube-cap { position: absolute; top: -35px; font-size: 28px; opacity: 0; transition: 0.5s; }
        .tube.completed .tube-cap { opacity: 1; top: -32px; }
        .tube.selected { transform: translateY(-15px); border-color: #fff; box-shadow: 0 0 20px var(--tube-color, var(--emerald)); }
        
        .ball { width: var(--ball-size); height: var(--ball-size); border-radius: 50%; margin: 1px 0; position: relative; background-image: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4) 0%, transparent 60%); box-shadow: inset -3px -3px 8px rgba(0,0,0,0.5); font-size: 20px; display: flex; justify-content: center; align-items: center; color: white; }
        .ball.skin-spotted::after { content: ''; position: absolute; width: 100%; height: 100%; top:0; left:0; border-radius: 50%; background-image: radial-gradient(rgba(0,0,0,0.5) 20%, transparent 25%), radial-gradient(rgba(255,255,255,0.3) 15%, transparent 20%); background-size: 14px 14px; opacity: 0.8; }
        .ball.skin-heart::after { content: '❤️'; opacity: 0.8; font-size: 16px; position: absolute; }
        .ball.skin-star::after { content: '⭐'; opacity: 0.8; font-size: 16px; position: absolute; }
        .ball.skin-glow { box-shadow: 0 0 15px white, inset -3px -3px 8px rgba(0,0,0,0.5); border: 1px solid white; }
        .ball.fog-active { background: #1a1a1a !important; box-shadow: none !important; }
        .ball.frozen::before { content: '❄️'; position: absolute; font-size: 24px; z-index: 2; opacity: 0.8; }
        .ball.golden-egg { background: radial-gradient(circle, #fbbf24 0%, #92400e 100%) !important; border: 2px solid white; box-shadow: 0 0 15px var(--gold); }

        .inventory { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; padding: 5px 10px 15px; background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center; gap: 6px; z-index: 100; border-top: 2px solid var(--emerald); box-sizing: border-box; }
        .item-btn { background: linear-gradient(145deg, #064e3b, #022c22); border: 1.5px solid var(--emerald); color: white; padding: 5px; border-radius: 12px; font-size: 9px; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-width: 60px; flex: 1; height: 55px; justify-content: center; }

        /* 모달 스타일 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; }
        .card { background: #064e3b; padding: 20px; border-radius: 30px; border: 3px solid var(--gold); width: 92%; max-width: 400px; text-align: center; max-height: 85vh; overflow-y: auto; position: relative; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 10px; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: var(--gold); color: black; font-weight: bold; }
        .shop-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
        .buy-btn { width: 100%; padding: 8px; background: var(--emerald); border: none; border-radius: 8px; color: white; font-size: 11px; cursor: pointer; }
        .buy-btn.owned { background: #374151; cursor: default; }

        /* 도감 */
        .collection-container { background:#01110a; width:94%; border-radius:30px; border:2px solid var(--emerald); height:85vh; display:flex; flex-direction:column; position: relative; overflow: hidden; }
        .collection-header { position: relative; background: #022c22; padding: 18px; border-bottom: 2px solid var(--emerald); display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .close-x { position: absolute; right: 20px; font-size: 36px; color: var(--gold); cursor: pointer; font-family: Arial; font-weight: bold; z-index: 7000; }
        .morph-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:15px; overflow-y: auto; flex-grow: 1; }
        .morph-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 9px; position: relative; }
        .main-tag { position: absolute; top: 5px; left: 5px; background: var(--gold); color: black; font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }

        /* 룰렛 */
        #roulette-box { width: 200px; height: 200px; border-radius: 50%; border: 10px solid var(--gold); margin: 20px auto; position: relative; transition: 3s cubic-bezier(0.1, 0, 0.2, 1); overflow: hidden; }
        .roulette-pin { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; background: red; z-index: 10; clip-path: polygon(0% 0%, 100% 0%, 50% 100%); }
    </style>
</head>
<body id="game-body">
    <div id="title-screen" class="full-screen">
        <div class="logo-text">쥬라기 유니버스<br>마스터 에디션 🦖</div>
        <div id="current-rank-msg" class="rank-info">닉네임을 설정해 보세요!</div>
        <div class="lobby-gecko-area" onclick="lobbyHeartEffect(event)">
            <div id="lobby-gecko-icon" style="font-size: 80px;">🐸</div>
            <div id="lobby-gecko-name" style="margin-top: 10px; color: var(--gold); font-size: 18px;">딸기 팩맨</div>
        </div>
        <button class="start-btn" onclick="enterGame()">탐험 시작하기</button>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="nav-btn" onclick="openRankModal()">🏆 랭킹</button>
            <button class="feed-btn" onclick="feedMainGecko()">🐛 먹이 (<span id="food-count">0</span>)</button>
            <button class="nav-btn" onclick="openSettings()">⚙️ 설정</button>
        </div>
        <div id="lobby-worm" class="worm-target" onclick="catchWorm(event)">🐛</div>
    </div>

    <canvas id="particle-canvas"></canvas>
    
    <div class="top-nav">
        <div class="nav-row">
            <div class="btn-group">
                <div class="nav-btn" onclick="openCollection()">📔 도감 <span id="collection-count">0</span></div>
                <div class="nav-btn" onclick="openMission()" style="border-color:var(--gold); color:var(--gold);">🏆 미션</div>
            </div>
            <div id="lvl-display">단계 01</div>
            <button class="nav-btn" onclick="openShop()">🏪 상점</button>
        </div>
        <div id="timer-display">40.00</div>
        <div class="nav-row">
            <div style="font-size: 10px; color: #fbbf24;">🥚 부화 온도: <span id="egg-percent">0</span>%</div>
            <div class="currency-box">💎 <span id="coin-display">0</span></div>
        </div>
        <div class="egg-progress-container"><div id="egg-bar"></div></div>
    </div>

    <div id="game-board"></div>

    <div class="inventory">
        <button class="item-btn" onclick="useUndo()"><span>↩️</span> 되돌리기 <div id="undo-count" style="color:var(--gold)">0개</div></button>
        <button class="item-btn" onclick="openRoulette()"><span>🎡</span> 룰렛</button>
        <button class="item-btn" onclick="useShuffle()"><span>✨</span> 셔플 <div id="shuffle-count" style="color:var(--gold)">0개</div></button>
        <button class="item-btn" onclick="useAddTube()"><span>🧪</span> 튜브 <div id="tube-count" style="color:var(--gold)">0개</div></button>
    </div>

    <div id="nick-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold);">🦖 닉네임 설정</h2>
            <input type="text" id="nick-input" placeholder="이름을 입력하세요" style="width:80%; padding:12px; border-radius:10px; border:none; margin-bottom:15px; font-family:'Jua';">
            <button onclick="saveNickname()" class="buy-btn" style="padding:15px; font-size:16px;">저장하기</button>
        </div>
    </div>

    <div id="rank-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold);">🏆 명예의 전당</h2>
            <div id="rank-list" style="text-align:left; margin-bottom:15px;"></div>
            <button onclick="closeModal('rank-modal')" class="buy-btn">닫기</button>
        </div>
    </div>

    <div id="roulette-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold); margin:0;">🎡 행운의 룰렛</h2>
            <p style="font-size:12px;">하루 한 번 무료!</p>
            <div class="roulette-pin"></div>
            <div id="roulette-box"></div>
            <button id="spin-btn" onclick="spinRoulette()" class="buy-btn" style="padding:15px; font-size:16px;">돌리기!</button>
            <button onclick="closeModal('roulette-modal')" style="margin-top:10px; background:none; border:none; color:#aaa; cursor:pointer;">닫기</button>
        </div>
    </div>

    <div id="shop-modal" class="modal">
        <div class="card">
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchShop('item')">아이템</button>
                <button class="tab-btn" onclick="switchShop('skin')">스킨</button>
                <button class="tab-btn" onclick="switchShop('gacha')">부화</button>
            </div>
            <div id="shop-item-tab"><div class="shop-grid">
                <button onclick="confirmBuy('undo', 1, 100)" class="buy-btn" style="background:var(--gold); color:black;">↩️ 1개 100</button>
                <button onclick="confirmBuy('undo', 10, 900)" class="buy-btn" style="background:#f87171;">↩️ 10개 900</button>
                <button onclick="confirmBuy('shuffle', 1, 100)" class="buy-btn" style="background:var(--gold); color:black;">✨ 1개 100</button>
                <button onclick="confirmBuy('shuffle', 10, 900)" class="buy-btn" style="background:#f87171;">✨ 10개 900</button>
                <button onclick="confirmBuy('tube', 1, 500)" class="buy-btn" style="background:var(--gold); color:black;">🧪 1개 500</button>
                <button onclick="confirmBuy('tube', 10, 4500)" class="buy-btn" style="background:#f87171;">🧪 10개 4500</button>
            </div></div>
            <div id="shop-skin-tab" style="display:none;">
                <h4 style="margin:5px 0; color:var(--gold);">공 스킨 (2,000💎)</h4>
                <div class="shop-grid" id="ball-skin-list"></div>
                <h4 style="margin:15px 0 5px; color:var(--gold);">튜브 색깔 (3,000💎)</h4>
                <div class="shop-grid" id="tube-skin-list"></div>
            </div>
            <div id="shop-gacha-tab" style="display:none;">
                <button onclick="confirmGacha(1, 500)" class="buy-btn" style="padding:15px; margin-bottom:10px;">🥚 랜덤 부화 1회 (500💎)</button>
                <button onclick="confirmGacha(10, 4500)" class="buy-btn" style="padding:15px;">🥚 10연속 부화 (4500💎)</button>
                <button class="buy-btn" onclick="openCoupon()" style="margin-top:10px; background:#1e3a8a;">쿠폰등록</button>
            </div>
            <button onclick="closeModal('shop-modal')" style="margin-top:15px; width:100%; padding:12px; background:#374151; border:none; border-radius:15px; color:white;">닫기</button>
        </div>
    </div>

    <div id="hatch-modal" class="modal">
        <div id="egg-icon" style="font-size:80px; animation: egg-shake 0.4s infinite;">🥚</div>
        <h2 id="hatch-msg" style="color: white; margin: 15px 0;">부화 중...</h2>
        <div id="hatch-result-area" style="display:none; width: 92%;">
            <div id="gacha-result-list" style="max-height:300px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;"></div>
            <button onclick="closeHatch()" style="margin-top: 15px; width:100%; padding:15px; background:var(--gold); border:none; border-radius:12px; font-weight:bold; color:black;">확인</button>
        </div>
    </div>

    <div id="collection-modal" class="modal">
        <div class="collection-container">
            <div class="collection-header">
                <div style="color:var(--emerald); font-size:18px; font-weight:bold;">🦎 1000마리 한글 박물관</div>
                <div class="close-x" onclick="closeModal('collection-modal')">×</div>
            </div>
            <div id="morph-grid" class="morph-grid"></div>
        </div>
    </div>

    <div id="mission-modal" class="modal">
        <div class="card">
            <h2 style="color:var(--gold); margin-top:0;">🏆 콜렉터 미션</h2>
            <div id="mission-list"></div>
            <button onclick="closeModal('mission-modal')" style="margin-top:15px; width:100%; padding:12px; background:var(--emerald); border:none; border-radius:15px; color:white;">닫기</button>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div style="font-size:70px;">🦖</div>
        <h2 id="win-praise" style="padding:0 30px; text-align:center; font-size:20px; color:var(--gold); line-height:1.4;"></h2>
        <button onclick="nextLevel()" style="padding:15px 60px; background:var(--emerald); border:none; border-radius:20px; color:white; font-size:18px; font-weight:bold; margin-top:15px;">다음 단계로</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>

        function play(key) { audio[key].currentTime = 0; audio[key].play().catch(()=>{}); }

        for(let i=0; i<1000; i++) {
            let name, icon;
            if(i < 300) { name = `${amPre[i % 30]} ${amKind[Math.floor(i / 30)]}`; icon = ['🐸','🦦','🐠','🐙'][i % 4]; }
            else if(i < 700) { const j = i - 300; name = `${gePre[j % 40]} ${geKind[Math.floor(j / 40)]}`; icon = ['🦎','🐍','🐉','🦂'][i % 4]; }
            else { const k = i - 700; name = `${diName[k % 20]} ${diEpi[Math.floor(k / 20)]}`; icon = ['🦖','🦕','🐲','🌋'][i % 4]; }
            if((i+1) % 100 === 0) name = `💎 [보물] ${name}`;
            GECKO_MORPHS.push({ name, icon });
        }

        const BALL_SKINS = [{id:'normal',name:'기본 공',price:0},{id:'skin-spotted',name:'점박이',price:2000},{id:'skin-heart',name:'러블리 하트',price:2000},{id:'skin-star',name:'반짝 별',price:2000},{id:'skin-glow',name:'네온 발광',price:2000}];
        const TUBE_SKINS = [{id:'#10b981',name:'에메랄드',price:0},{id:'#f59e0b',name:'골드 리미티드',price:3000},{id:'#ec4899',name:'핫 핑크',price:3000},{id:'#8b5cf6',name:'럭셔리 퍼플',price:3000},{id:'#3b82f6',name:'오션 블루',price:3000}];

        let state = { 
            level: 1, coins: 500, tubes: [], selected: null, history: [], 
            inventory: { undo: 2, tube: 0, shuffle: 1 }, 
            collection: "1" + "0".repeat(999), eggProgress: 0, comboCount: 0, lastMoveTime: 0, 
            milestones: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000], claimed: [],
            ballSkin: 'normal', tubeSkin: '#10b981', ownedBallSkins: ['normal'], ownedTubeSkins: ['#10b981'],
            isHardMode: false, isFogMode: false, targetBalls: 4, 
            nickname: "", ranking: {}, lastRoulette: 0, foodCount: 0, mainGeckoIdx: 0
        };

        let timerInterval = null;
        let timeLeft = 40.0;

        function enterGame() { if(!state.nickname) { document.getElementById('nick-modal').style.display='flex'; return; } play('tap'); document.getElementById('title-screen').style.display = 'none'; }
        
        function init() { 
            const saved = localStorage.getItem('Dindu_LeopardGecko_Eternal_Save'); 
            if(saved) state = {...state, ...JSON.parse(saved)}; 
            startLevel(); initParticles(); updateUI(); updateLobby(); startWormSpawn();
        }

        function save() { localStorage.setItem('Dindu_LeopardGecko_Eternal_Save', JSON.stringify(state)); }

        // 로비 & 랭킹 기능
        function saveNickname() {
            const val = document.getElementById('nick-input').value.trim();
            if(val) { state.nickname = val; save(); enterGame(); }
        }

        function updateLobby() {
            const gecko = GECKO_MORPHS[state.mainGeckoIdx];
            document.getElementById('lobby-gecko-icon').innerText = gecko.icon;
            document.getElementById('lobby-gecko-name').innerText = gecko.name;
            document.getElementById('food-count').innerText = state.foodCount;
            // 랭킹 업데이트
            state.ranking[state.nickname] = Math.max(state.ranking[state.nickname] || 0, state.level);
            const others = Object.entries(state.ranking).sort((a,b) => b[1] - a[1]);
            if(others.length > 1) {
                const myRank = others.findIndex(x => x[0] === state.nickname) + 1;
                document.getElementById('current-rank-msg').innerText = `${state.nickname}님은 현재 명예의 전당 ${myRank}위!`;
            }
        }

        function lobbyHeartEffect(e) {
            const heart = document.createElement('div'); heart.className = 'heart-fx'; heart.innerText = '❤️';
            heart.style.left = `${e.clientX - 10}px`; heart.style.top = `${e.clientY - 20}px`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
            play('tap');
        }

        function feedMainGecko() {
            if(state.foodCount > 0) { state.foodCount--; state.coins += 10; confetti({particleCount:30}); updateLobby(); updateUI(); save(); }
            else alert('먹이가 부족해요! 로비에서 밀웜을 잡거나 게임을 클리어하세요.');
        }

        function startWormSpawn() {
            setInterval(() => {
                if(document.getElementById('title-screen').style.display !== 'none') {
                    const worm = document.getElementById('lobby-worm');
                    worm.style.left = Math.random() * 80 + '%';
                    worm.style.top = Math.random() * 80 + '%';
                    worm.style.opacity = 1;
                    setTimeout(() => worm.style.opacity = 0, 3000);
                }
            }, 10000);
        }

        function catchWorm(e) { state.foodCount++; e.target.style.opacity = 0; play('tap'); updateLobby(); save(); }

        // 게임 엔진 수정
        function calculateBallSize(count) { const maxTubeWidth = window.innerWidth / count - 6; const ballSize = Math.min(Math.max(maxTubeWidth - 14, 25), 54); document.documentElement.style.setProperty('--ball-size', `${ballSize}px`); }

        function startLevel() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('game-body').className = '';
            state.targetBalls = 4; state.isHardMode = false; state.isFogMode = false;
            
            let isTimeAttack = (state.level >= 180 && state.level % 5 === 0);
            if(isTimeAttack) {
                timeLeft = 40.0;
                document.getElementById('timer-display').style.display = 'block';
                timerInterval = setInterval(() => {
                    timeLeft -= 0.01;
                    document.getElementById('timer-display').innerText = timeLeft.toFixed(2);
                    if(timeLeft <= 0) { clearInterval(timerInterval); alert('시간 초과! 다시 시도하세요.'); startLevel(); }
                }, 10);
            }

            if (state.level >= 180) {
                if (Math.random() < 0.4) { state.isHardMode = true; state.targetBalls = Math.random() > 0.5 ? 5 : 6; }
                if (Math.random() < 0.3) state.isFogMode = true;
            }

            const colorCount = Math.min(3 + Math.floor(state.level / 2.5), 8); 
            const tubeCount = Math.min(colorCount + 3, 12);
            calculateBallSize(tubeCount);

            let ballsArr = []; 
            for(let i=0; i<colorCount; i++) for(let j=0; j<state.targetBalls; j++) ballsArr.push({...COLORS[i], revealed: false});
            ballsArr.sort(() => Math.random() - 0.5);
            state.tubes = [];
            for(let i=0; i<tubeCount; i++) {
                let tubeBalls = i < colorCount ? ballsArr.splice(0, state.targetBalls) : [];
                if (tubeBalls.length > 0) tubeBalls[tubeBalls.length - 1].revealed = true;
                state.tubes.push(tubeBalls);
            }
            state.selected = null; state.history = []; 
            document.documentElement.style.setProperty('--tube-color', state.tubeSkin);
            render(); updateUI();
        }

        function render() {
            const board = document.getElementById('game-board'); board.innerHTML = '';
            state.tubes.forEach((balls, idx) => {
                const wrapper = document.createElement('div'); wrapper.className = 'tube-wrapper';
                const isComplete = balls.length === state.targetBalls && balls.every(b => b.ball === balls[0].ball);
                const tube = document.createElement('div');
                tube.className = `tube ${state.selected === idx ? 'selected' : ''} ${isComplete ? 'completed' : ''} ${state.targetBalls===5?'hard-5':state.targetBalls===6?'hard-6':''}`;
                tube.onclick = () => handleTap(idx);
                const cap = document.createElement('div'); cap.className = 'tube-cap'; cap.innerText = '🦎';
                tube.appendChild(cap);
                balls.forEach((data, bIdx) => {
                    const ball = document.createElement('div'); 
                    ball.className = `ball ${state.ballSkin} ${data.frozen ? 'frozen' : ''}`;
                    ball.style.backgroundColor = data.ball; 
                    ball.style.setProperty('--spot-color', data.spot);
                    if (state.isFogMode && !data.revealed) ball.classList.add('fog-active');
                    tube.appendChild(ball);
                });
                wrapper.appendChild(tube); board.appendChild(wrapper);
            });
        }

        function handleTap(idx) {
            play('tap');
            if (state.selected === null) { if (state.tubes[idx].length > 0) state.selected = idx; }
            else { if (state.selected === idx) state.selected = null; else move(state.selected, idx); }
            render();
        }

        function move(from, to) {
            const f = state.tubes[from]; const t = state.tubes[to];
            if (t.length < state.targetBalls + 1 && (t.length === 0 || t[t.length-1].ball === f[f.length-1].ball)) {
                state.history.push(JSON.stringify(state.tubes));
                let ball = f.pop(); ball.revealed = true; t.push(ball); 
                if (f.length > 0) f[f.length - 1].revealed = true;
                state.selected = null; play('drop');
                if(checkWin()) { clearInterval(timerInterval); setTimeout(showWin, 600); }
            } else state.selected = null;
        }

        function checkWin() { return state.tubes.every(t => t.length === 0 || (t.length === state.targetBalls && t.every(b => b.ball === t[0].ball))); }

        function showWin() {
            play('win'); 
            let reward = (state.level % 5 === 0 && state.level >= 180) ? 300 : 100;
            state.coins += reward; state.eggProgress += 20;
            if(Math.random() < 0.3) state.foodCount++;
            document.getElementById('win-praise').innerText = reward === 300 ? "⚡ 타임어택 성공! 3배 보상!" : "완벽한 정렬입니다! ❤️";
            document.getElementById('win-modal').style.display = 'flex';
            confetti({ particleCount: 150 });
            if (state.eggProgress >= 100) { state.eggProgress = 0; setTimeout(() => hatchGacha(1), 1000); }
            save(); updateUI(); updateLobby();
        }

        // 룰렛 시스템
        function openRoulette() {
            const now = Date.now();
            if(now - state.lastRoulette < 86400000) { 
                const diff = 86400000 - (now - state.lastRoulette);
                const hours = Math.floor(diff / 3600000);
                alert(`이미 돌렸어요! ${hours}시간 뒤에 다시 오세요.`); 
                return; 
            }
            const box = document.getElementById('roulette-box');
            box.innerHTML = '';
            const prizes = ["500💎", "🐛x3", "✨x1", "200💎", "🐛x1", "↩️x2"];
            prizes.forEach((p, i) => {
                const div = document.createElement('div');
                div.style.cssText = `position:absolute; width:100%; height:100%; transform:rotate(${i*60}deg); text-align:center; padding-top:20px; border-right:1px solid gold; box-sizing:border-box;`;
                div.innerText = p;
                box.appendChild(div);
            });
            document.getElementById('roulette-modal').style.display = 'flex';
        }

        function spinRoulette() {
            const deg = 1800 + Math.random() * 360;
            const box = document.getElementById('roulette-box');
            box.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spin-btn').disabled = true;
            setTimeout(() => {
                const resultIdx = Math.floor(((deg % 360)) / 60);
                const rewards = [()=>state.coins+=500, ()=>state.foodCount+=3, ()=>state.inventory.shuffle++, ()=>state.coins+=200, ()=>state.foodCount++, ()=>state.inventory.undo+=2];
                rewards[resultIdx]();
                state.lastRoulette = Date.now();
                save(); updateUI(); updateLobby();
                alert('축하합니다! 보상이 지급되었습니다.');
                closeModal('roulette-modal');
                document.getElementById('spin-btn').disabled = false;
            }, 3500);
        }

        // 공통 UI 함수
        function updateUI() {
            document.getElementById('lvl-display').innerText = `단계 ${state.level.toString().padStart(2, '0')}`;
            document.getElementById('coin-display').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('undo-count').innerText = `${state.inventory.undo}개`;
            document.getElementById('shuffle-count').innerText = `${state.inventory.shuffle}개`;
            document.getElementById('tube-count').innerText = `${state.inventory.tube}개`;
            document.getElementById('collection-count').innerText = (state.collection.match(/1/g) || []).length;
            document.getElementById('egg-bar').style.width = `${state.eggProgress}%`;
            document.getElementById('egg-percent').innerText = state.eggProgress;
        }

        function openRankModal() {
            const others = Object.entries(state.ranking).sort((a,b) => b[1] - a[1]);
            document.getElementById('rank-list').innerHTML = others.map((r, i) => `<div>${i+1}위: ${r[0]} (${r[1]}단계)</div>`).join('');
            document.getElementById('rank-modal').style.display = 'flex';
        }

        function openSettings() { const n = prompt("새 닉네임 입력", state.nickname); if(n) { state.nickname = n; save(); updateLobby(); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openShop() { document.getElementById('shop-modal').style.display = 'flex'; switchShop('item'); }
        function switchShop(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
            ['item', 'skin', 'gacha'].forEach(t => document.getElementById(`shop-${t}-tab`).style.display = (t === tab ? 'block' : 'none'));
            if(tab === 'skin') renderSkinShop();
        }
        function renderSkinShop() {
            const bList = document.getElementById('ball-skin-list'); bList.innerHTML = BALL_SKINS.map(s => `<div class="shop-item"><div class="ball ${s.id}" style="background-color:#f87171; width:30px; height:30px;"></div><span style="font-size:10px;">${s.name}</span><button onclick="buySkin('ball', '${s.id}', ${s.price})" class="buy-btn ${state.ownedBallSkins.includes(s.id)?'owned':''}">${state.ownedBallSkins.includes(s.id)? (state.ballSkin === s.id ? '장착중' : '장착하기') : s.price+'💎'}</button></div>`).join('');
            const tList = document.getElementById('tube-skin-list'); tList.innerHTML = TUBE_SKINS.map(s => `<div class="shop-item"><div style="width:20px; height:30px; border:2px solid ${s.id}; border-top:none; border-radius:0 0 10px 10px;"></div><span style="font-size:10px;">${s.name}</span><button onclick="buySkin('tube', '${s.id}', ${s.price})" class="buy-btn ${state.ownedTubeSkins.includes(s.id)?'owned':''}">${state.ownedTubeSkins.includes(s.id)? (state.tubeSkin === s.id ? '장착중' : '장착하기') : s.price+'💎'}</button></div>`).join('');
        }
        function buySkin(type, id, price) { const owned = (type === 'ball') ? state.ownedBallSkins : state.ownedTubeSkins; if (owned.includes(id)) { if(type === 'ball') state.ballSkin = id; else state.tubeSkin = id; document.documentElement.style.setProperty('--tube-color', state.tubeSkin); save(); render(); renderSkinShop(); return; } if (state.coins >= price) { state.coins -= price; owned.push(id); save(); updateUI(); renderSkinShop(); } else alert('다이아 부족!'); }
        function hatchGacha(count) {
            document.getElementById('hatch-modal').style.display = 'flex'; document.getElementById('hatch-result-area').style.display = 'none';
            setTimeout(() => {
                play('hatch'); const list = document.getElementById('gacha-result-list'); list.innerHTML = ''; let totalRefund = 0;
                for(let i=0; i<count; i++) {
                    const idx = Math.floor(Math.random() * 1000); const isDup = state.collection[idx] === '1'; const g = GECKO_MORPHS[idx];
                    if (isDup) totalRefund += (count===10?225:250); else state.collection = state.collection.substring(0, idx) + '1' + state.collection.substring(idx + 1);
                    const item = document.createElement('div'); item.className = 'gacha-item';
                    item.innerHTML = `<span style="font-size:24px">${g.icon}</span><div><b>${g.name}</b><br><small>번호.${idx+1}</small></div>${isDup ? `<span class="duplicate-tag">중복</span><span class="payback-text">+${(count===10?225:250)}💎</span>` : ''}`;
                    list.appendChild(item);
                }
                if (totalRefund > 0) { state.coins += totalRefund; document.getElementById('hatch-msg').innerText = `${totalRefund}💎 회수!`; }
                else document.getElementById('hatch-msg').innerText = "새 친구 탄생!";
                document.getElementById('hatch-result-area').style.display = 'block'; save(); updateUI(); checkMilestone();
            }, 1200);
        }
        function checkMilestone() { const count = (state.collection.match(/1/g) || []).length; state.milestones.forEach(m => { if (count >= m && !state.claimed.includes(m)) { state.claimed.push(m); triggerJackpot(m); } }); }
        function triggerJackpot(m) { confetti({ particleCount: 300, spread: 100 }); state.coins += 2000; state.inventory.shuffle += 5; state.inventory.undo += 5; alert(`🎉 도감 ${m}마리 달성! 💎 2,000개 보너스!`); save(); updateUI(); }
        function openMission() {
            const count = (state.collection.match(/1/g) || []).length; const list = document.getElementById('mission-list'); list.innerHTML = '';
            state.milestones.forEach(m => {
                const isDone = state.claimed.includes(m); const row = document.createElement('div');
                row.style.cssText = `background:rgba(0,0,0,0.3); padding:10px; margin-bottom:5px; border-radius:10px; border-left:4px solid ${isDone?'#fbbf24':'#10b981'}; text-align:left; font-size:12px;`;
                row.innerHTML = `<b>도감 ${m}마리</b> <span style="float:right">${isDone?'✅':count+'/'+m}</span>`;
                list.appendChild(row);
            });
            document.getElementById('mission-modal').style.display = 'flex';
        }
        function openCollection() {
            const grid = document.getElementById('morph-grid'); grid.innerHTML = ''; document.getElementById('collection-modal').style.display = 'flex';
            const frag = document.createDocumentFragment();
            for(let i=0; i<1000; i++) {
                const isU = state.collection[i] === '1'; const g = GECKO_MORPHS[i];
                const card = document.createElement('div'); card.className = `morph-card ${isU ? '' : 'locked'}`;
                card.style.opacity = isU ? '1' : '0.3';
                if (isU) card.onclick = () => { state.mainGeckoIdx = i; save(); updateLobby(); alert('로비 게코로 설정되었습니다!'); };
                card.innerHTML = `${state.mainGeckoIdx === i ? '<span class="main-tag">대표</span>' : ''}<div style="font-size:28px">${g.icon}</div><div style="font-weight:bold;">${g.name}</div><div style="font-size:8px;">번호.${i+1}</div>`;
                frag.appendChild(card);
            }
            grid.appendChild(frag);
        }
        function openCoupon() { const code = prompt("비밀 쿠폰 입력! ❤️"); if(code === "딘두사랑해") { state.coins += 10000; updateUI(); save(); alert("🎁 10,000 다이아몬드 지급 완료! ❤️"); } }
        function nextLevel() { state.level++; document.getElementById('win-modal').style.display = 'none'; save(); startLevel(); }
        function closeHatch() { document.getElementById('hatch-modal').style.display = 'none'; }
        function useUndo() { if(state.inventory.undo > 0 && state.history.length) { state.inventory.undo--; state.tubes = JSON.parse(state.history.pop()); render(); updateUI(); save(); } }
        function useAddTube() { if(state.inventory.tube > 0 && state.tubes.length < 12) { state.inventory.tube--; state.tubes.push([]); render(); updateUI(); save(); } }
        function useShuffle() { if(state.inventory.shuffle > 0) { play('hatch'); startLevel(); state.inventory.shuffle--; save(); } }
        function initParticles() { const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let p = Array(15).fill().map(() => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2, v: Math.random() * 0.15 })); function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; p.forEach(i => { i.y -= i.v; if(i.y < 0) i.y = canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); } draw(); }
        init();
    </script>
</body>
</html>
